<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Concept 3: Dynamic Angles</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --spread-w: 303mm;
            --spread-h: 216mm;
            --bleed: 3mm;
            --navy: #1C244B;
            --sky: #52B1E1;
            --white: #FAFBFC;
            --flap-w: calc(97mm + var(--bleed));
            --back-w: 100mm;
            --front-w: calc(100mm + var(--bleed));
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .canvas {
            width: var(--spread-w);
            height: var(--spread-h);
            background: var(--white);
            position: relative;
            display: flex;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Dynamic Background Angles */
        .bg-angle-navy {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--navy);
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
            z-index: 1;
        }
        .bg-angle-sky {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--sky);
            clip-path: polygon(0 0, 100% 0, 100% 88%, 0 100%);
            z-index: 0;
        }

        .panel {
            position: relative;
            height: 100%;
            padding: calc(var(--bleed) + 10mm);
            z-index: 5;
            display: flex;
            flex-direction: column;
            color: var(--white);
        }

        /* Flap */
        .flap { width: var(--flap-w); border-right: 2px dashed rgba(255,255,255,0.2); }
        .flap h2 { font-size: 22pt; font-weight: 900; font-style: italic; text-transform: uppercase; margin-top: 20mm; margin-bottom: 5mm; }
        .flap p { font-size: 10.5pt; line-height: 1.6; font-weight: 400; opacity: 0.9; }

        /* Back */
        .back { width: var(--back-w); }
        .back-box { background: var(--sky); padding: 10mm; margin-top: auto; clip-path: polygon(0 15px, 100% 0, 100% 100%, 0 100%); color: var(--navy); }
        .back-box h3 { font-size: 14pt; font-weight: 900; margin-bottom: 5mm; text-transform: uppercase; }
        .back-box p { font-size: 9pt; font-weight: 700; line-height: 1.5; }
        .qr { margin-top: 5mm; width: 25mm; height: 25mm; mix-blend-mode: multiply; }

        /* Front */
        .front { width: var(--front-w); padding: 0; }
        
        .front-image-wrap {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 75%;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 85%);
            z-index: 2;
        }
        .front-image { width: 100%; height: 100%; object-fit: cover; }
        .front-image-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(28,36,75,0.8), transparent); mix-blend-mode: multiply;}
        
        .front-content {
            position: absolute;
            bottom: calc(var(--bleed) + 10mm);
            left: calc(var(--bleed) + 10mm);
            right: var(--bleed);
            z-index: 5;
            color: var(--navy);
        }

        .logo { position: absolute; top: calc(var(--bleed) + 10mm); right: calc(var(--bleed) + 10mm); height: 35px; z-index: 10; filter: brightness(0) invert(1); }

        .front h1 { font-size: 28pt; font-weight: 900; line-height: 0.95; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 5mm;}
        .front h1 span { color: var(--sky); font-style: italic; }

    </style>
</head>
<body>
    <div class="canvas">
        <div class="bg-angle-sky"></div>
        <div class="bg-angle-navy"></div>

        <!-- Flap -->
        <div class="panel flap">
            <h2>Die<br>Zukunft<br>Des FM</h2>
            <p>Dynamisch, zuverlässig und auf den Punkt. GM Süd bringt Ihr Gebäude-Management aufs nächste Level. Professionell in München und Umgebung.</p>
        </div>

        <!-- Back -->
        <div class="panel back">
            <div class="back-box">
                <h3>Sprechen Sie<br>Mit Uns</h3>
                <p>GM Süd GmbH<br>Arnulfstraße 37<br>80335 München</p>
                <p style="margin-top: 5mm;">T +49 89 123 456 0<br>info@gm-sued.de</p>
                <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.gm-sued.de&color=1C244B&bgcolor=52B1E1" alt="QR">
            </div>
        </div>

        <!-- Front -->
        <div class="panel front">
            <img src="../../assets/gmsued_logo.png" class="logo" alt="Logo">
            
            <div class="front-image-wrap">
                <img class="front-image" src="../../assets/v8_hero_building.png" alt="Hero">
                <div class="front-image-overlay"></div>
            </div>
            
            <div class="front-content">
                <h1>Facility<br><span>Management</span><br>Neu Gedacht.</h1>
            </div>
        </div>
    </div>
</body>
</html>
